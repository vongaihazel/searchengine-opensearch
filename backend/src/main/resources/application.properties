# Spring application name
spring.application.name=searchengine

# PostgreSQL Database Configuration - Uses Railway variables or local fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/searchdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mysecretpassword}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# OpenSearch Configuration
opensearch.host=${OPENSEARCH_HOST:localhost}
opensearch.port=9200
opensearch.username=admin
opensearch.password=admin
opensearch.scheme=https

# SSL Configuration - Replaced C:/ path with a dynamic classpath or env variable
opensearch.ssl.enabled=true
opensearch.ssl.trust-store-location=${TRUST_STORE_PATH:classpath:certs/truststore.jks}
opensearch.ssl.trust-store-password=changeit

